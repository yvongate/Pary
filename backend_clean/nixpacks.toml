# Configuration Nixpacks pour Railway
# Installe les dépendances système pour Playwright seulement

[phases.setup]
# Dépendances système pour Playwright (Bright Data scraper)
# Selenium/FlashScore désactivé pour économiser ressources
aptPkgs = [
  "fonts-liberation",
  "libnss3",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2t64"
]

# Laisser nixpacks gérer l'installation Python
# start.sh s'occupe de Playwright (pour Bright Data uniquement)
