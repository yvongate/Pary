services:
  # Backend FastAPI
  - type: web
    name: pary-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DEEPINFRA_API_KEY
        sync: false
      - key: AUTOMATION_API_KEY
        generateValue: true
